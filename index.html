<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f4f6fb">
    <title>Xavier's Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f6fb;
            --surface: rgba(255, 255, 255, 0.9);
            --surface-strong: #ffffff;
            --border: #d8dfeb;
            --text: #172033;
            --muted: #62718a;
            --accent: #2f6fed;
            --accent-deep: #1f56be;
            --shadow: 0 18px 40px rgba(29, 45, 78, 0.08);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 16px;
            --container: 1120px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(47, 111, 237, 0.08), transparent 26rem),
                linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        a {
            color: inherit;
        }

        img {
            display: block;
            max-width: 100%;
        }

        .skip-link {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 20;
            padding: 0.9rem 1.1rem;
            border-radius: 999px;
            background: var(--accent-deep);
            color: #fff;
            text-decoration: none;
            transform: translateY(-180%);
            transition: transform 180ms ease;
        }

        .skip-link:focus-visible {
            transform: translateY(0);
        }

        :focus-visible {
            outline: 3px solid rgba(47, 111, 237, 0.38);
            outline-offset: 3px;
        }

        .page-shell {
            width: min(calc(100% - 2rem), var(--container));
            margin: 0 auto;
            padding:
                max(1.1rem, env(safe-area-inset-top)) 0
                max(2rem, env(safe-area-inset-bottom));
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        h1,
        h2 {
            scroll-margin-top: 1.25rem;
        }

        .masthead {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1rem;
            align-items: center;
            margin-top: 0.45rem;
            padding: 1.25rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            background: var(--surface);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .title-block {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
        }

        .title-block h1 {
            font-family: "Fraunces", serif;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 0.95;
            letter-spacing: -0.05em;
        }

        .title-intro {
            max-width: 54ch;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 500;
        }

        .header-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .stat-pill {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            padding: 0.5rem 0.72rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--surface-strong);
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 700;
        }

        .stat-pill strong {
            margin-right: 0.35rem;
            color: var(--text);
            font-size: 0.9rem;
        }

        .status-block {
            width: fit-content;
        }

        main {
            display: grid;
            gap: 1rem;
            margin-top: 1rem;
        }

        .section-card {
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--surface);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            overflow: hidden;
        }

        .section-head {
            padding: 1rem 1.2rem 0.85rem;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.6);
        }

        .section-head h2 {
            font-family: "Fraunces", serif;
            font-size: clamp(1.3rem, 2.2vw, 1.8rem);
            letter-spacing: -0.03em;
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, 200px);
            justify-content: start;
            gap: 0.85rem;
            padding: 1rem;
        }

        .service-card {
            display: grid;
            gap: 0.55rem;
            min-width: 0;
            min-height: 116px;
            padding: 0.95rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface-strong);
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(29, 45, 78, 0.04);
            transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
            touch-action: manipulation;
        }

        .service-card:hover,
        .service-card:focus-visible {
            border-color: #aac0f5;
            box-shadow: 0 14px 28px rgba(47, 111, 237, 0.12);
            transform: translateY(-2px);
        }

        .service-name {
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.2;
            word-break: break-word;
        }

        .service-host {
            margin-top: auto;
            color: var(--text);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .service-endpoint {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .state-card {
            padding: 1rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--surface);
            box-shadow: var(--shadow);
            color: var(--muted);
            font-weight: 600;
        }

        .state-card.error {
            color: #a23333;
        }

        .footnote {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 0.75rem;
            margin-top: 1rem;
            padding: 0 0.15rem;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .footnote strong {
            color: var(--text);
        }

        @media (max-width: 760px) {
            .page-shell {
                width: min(calc(100% - 1rem), var(--container));
            }

            .masthead {
                align-items: start;
            }

            .service-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                justify-content: stretch;
            }
        }

        @media (max-width: 520px) {
            .service-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

<body>
    <a class="skip-link" href="#content">Skip to content</a>
    <div class="page-shell">
        <header class="masthead">
            <div class="title-block">
                <h1 translate="no">Xavier's Services</h1>
                <p class="title-intro" id="title-intro"></p>
                <div class="header-meta" id="header-meta" aria-label="Service statistics"></div>
                <div class="status-block" aria-label="Status">
                    <img src="https://healthchecks.io/badge/ceb5a174-ca12-4e29-a004-b8bcc4/5aLzBxll/rclone.svg"
                        alt="Healthchecks badge for rclone status">
                </div>
            </div>
        </header>

        <main id="content">
            <div class="state-card" id="loading-state">Loading services...</div>
        </main>

        <footer class="footnote">
            <p><strong>External links</strong> open in a new tab.</p>
            <p>&copy; 2024-2025 Xavier's Services. All rights reserved.</p>
        </footer>
    </div>

    <script>
        const main = document.getElementById("content");

        function toSlug(value) {
            return String(value)
                .toLowerCase()
                .trim()
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-+|-+$/g, "") || "group";
        }

        function getServiceDetails(service) {
            const parsed = new URL(service.url);
            const host = parsed.hostname.split(".")[0] || parsed.hostname;
            const scheme = parsed.protocol.replace(":", "").toUpperCase();
            const port = parsed.port ? `:${parsed.port}` : "";
            const path = parsed.pathname && parsed.pathname !== "/" ? parsed.pathname : "";

            return {
                host,
                endpoint: `${port}${path}`,
                scheme
            };
        }

        function createServiceCard(service) {
            const details = getServiceDetails(service);
            const card = document.createElement("a");
            card.className = "service-card";
            card.href = service.url;
            card.target = "_blank";
            card.rel = "noreferrer noopener";
            card.setAttribute("aria-label", `Open ${service.name} in a new tab`);

            const name = document.createElement("h3");
            name.className = "service-name";
            name.textContent = service.name;

            const host = document.createElement("p");
            host.className = "service-host";
            host.textContent = details.host;

            const endpoint = document.createElement("p");
            endpoint.className = "service-endpoint";
            endpoint.textContent = `${details.scheme} · ${details.endpoint}`;

            card.append(name, host, endpoint);
            return card;
        }

        function createSection(group) {
            const sectionId = `${toSlug(group.title)}-heading`;
            const section = document.createElement("section");
            section.className = "section-card";
            section.setAttribute("aria-labelledby", sectionId);

            const head = document.createElement("div");
            head.className = "section-head";

            const heading = document.createElement("h2");
            heading.id = sectionId;
            heading.textContent = group.title;

            head.appendChild(heading);

            const grid = document.createElement("div");
            grid.className = "service-grid";

            group.services.forEach((service) => {
                grid.appendChild(createServiceCard(service));
            });

            section.append(head, grid);
            return section;
        }

        function renderStats(groups) {
            const meta = document.getElementById("header-meta");
            const totalServices = groups.reduce((sum, group) => sum + group.services.length, 0);
            const totalEnvironments = groups.length;
            const totalHosts = new Set(
                groups.flatMap((group) =>
                    group.services.map((service) => getServiceDetails(service).host)
                )
            ).size;

            const stats = [
                { value: totalServices, label: "services" },
                { value: totalEnvironments, label: "environments" },
                { value: totalHosts, label: "hosts" }
            ];

            meta.replaceChildren(
                ...stats.map((stat) => {
                    const pill = document.createElement("div");
                    pill.className = "stat-pill";
                    const strong = document.createElement("strong");
                    strong.textContent = String(stat.value);
                    pill.append(strong, document.createTextNode(stat.label));
                    return pill;
                })
            );
        }

        function renderIntro(groups) {
            const intro = document.getElementById("title-intro");
            const titles = groups.map((group) => group.title).filter(Boolean);

            if (!titles.length) {
                intro.textContent = "A compact directory for your services.";
                return;
            }

            let environmentText = "";
            if (titles.length === 1) {
                environmentText = titles[0];
            } else if (titles.length === 2) {
                environmentText = `${titles[0]} and ${titles[1]}`;
            } else {
                environmentText = `${titles.slice(0, -1).join(", ")}, and ${titles.at(-1)}`;
            }

            intro.textContent = `A compact directory for dashboards and utilities across ${environmentText}.`;
        }

        function renderState(message, isError = false) {
            main.innerHTML = "";
            const state = document.createElement("div");
            state.className = `state-card${isError ? " error" : ""}`;
            state.textContent = message;
            main.appendChild(state);
        }

        async function loadServices() {
            try {
                const response = await fetch("./services.json", { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const groups = Array.isArray(data) ? data : [];

                if (!groups.length) {
                    renderState("No services configured.");
                    return;
                }

                main.innerHTML = "";
                renderIntro(groups);
                renderStats(groups);
                groups.forEach((group) => {
                    if (!group || !Array.isArray(group.services) || !group.services.length) {
                        return;
                    }
                    main.appendChild(createSection(group));
                });

                if (!main.children.length) {
                    renderState("No services configured.");
                }
            } catch (error) {
                renderState("Failed to load services.json.", true);
                console.error(error);
            }
        }

        loadServices();
    </script>
</body>

</html>
